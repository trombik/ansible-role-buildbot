---
- hosts: server
  become: yes
  become_method: sudo
  environment:
    http_proxy: "{{ http_proxy | default() }}"
    https_proxy: "{{ https_proxy | default() }}"
    no_proxy: "{{ no_proxy | default() }}"

  pre_tasks:
  roles:
    - name: trombik.freebsd_pkg_repo
    - name: trombik.pip
    - name: trombik.git
    - ansible-role-buildbot
  vars:
    freebsd_pkg_repo:
      FreeBSD:
        enabled: "false"
        state: present
      FreeBSD_latest:
        enabled: "true"
        state: present
        url: http://192.168.1.118/packages/12_0-trombik
        signature_type: NONE
        mirror_type: HTTP
    buildbot_extra_cfg:
      - name: cfg.yml
        type: yaml
        content:
          env: {}
          not_important_files: []
          projects:
          -   branches:
              - master
              name: foo
              repository: file:///home/vagrant/foo
              stages: []
              tags:
              - example
              vcs_type: git+poller
          stages: []
          workers:
          -   id: 1942349253
              name: worker1
              number: 1
              password: pass
              type: Worker
          -   id: 2405852087
              name: worker2
              number: 1
              password: pass
              type: Worker
    buildbot_flags_freebsd: |
      buildbot_basedir="{{ buildbot_conf_dir }}"
      buildbot_user="{{ buildbot_user }}"
    buildbot_extra_packages:
      - devel/py-buildbot-www
    buildbot_flags: "{{ buildbot_flags_freebsd }}"
    buildbot_package: devel/py-buildbot_travis
    buildbot_create_master_executable: bbtravis
    buildbot_create_master_flags: ""
    buildbot_master_cfg_content: |
      from buildbot_travis import TravisConfigurator
      #from buildbot.plugins import *
      import os
      c = BuildmasterConfig = {}
      c['protocols'] = {'pb': {'port': 9989}}
      c['www'] = dict(port=8010,
                    plugins=dict(waterfall_view={}, console_view={}, grid_view={}))
      c['db'] = {
        'db_url' : "sqlite:///state.sqlite",
      }
      TravisConfigurator(BuildmasterConfig, basedir).fromYaml('{{ buildbot_conf_dir }}/cfg.yml')
      c['titleURL'] = "https://github.com/buildbot/buildbot_travis"
      c['buildbotURL'] = "http://{{ ansible_em1.ipv4[0].address }}:8010/"
